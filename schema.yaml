        Num_Bank_Accounts:
          type: integer
        Num_Credit_Card:
          type: integer
        Interest_Rate:
          type: float
        Num_of_Loan:
          type: integer
        Type_of_Loan:
          type: string
        Delay_from_due_date:
          type: integer
