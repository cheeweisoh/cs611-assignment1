    features_attributes:
      table_dir: features_attributes_cleaned
      source_dir: features_attributes_raw
      partition_col: snapshot_date
      columns:
        Customer_ID:
          type: string
          primary_key: true
        snapshot_date:
          type: date
          primary_key: true
        Name:
          type: string
        Age:
