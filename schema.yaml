        Payment_Behaviour:
          type: string
        Monthly_Balance:
          type: float
    lms_loan_daily:
      table_dir: lms_loan_daily_cleaned
      source_dir: lms_loan_daily_raw
      partition_col: snapshot_date
      columns:
        loan_id:
          type: string
          primary_key: true
        snapshot_date:
          type: date
          primary_key: true
        Customer_ID:
          type: string
        loan_start_date:
          type: date
        tenure:
          type: integer
        installment_num:
          type: integer
        loan_amt:
          type: float
        due_amt:
          type: float
        paid_amt:
          type: float
        overdue_amt:
          type: float
        balance:
          type: float

