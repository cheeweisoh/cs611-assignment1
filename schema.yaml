source:
  path: "data/"

bronze:
  path: "datamart/bronze/"
  tables:
    feature_clickstream:
      table_dir: feature_clickstream_raw
      partition_col: snapshot_date
    features_attributes:
      table_dir: features_attributes_raw
      partition_col: snapshot_date
    features_financials:
      table_dir: features_financials_raw
      partition_col: snapshot_date
    lms_loan_daily:
      table_dir: lms_loan_daily_raw
      partition_col: snapshot_date

